version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hosteliq-db
    restart: always
    environment:
      POSTGRES_DB: hosteliq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  redis:
    image: redis:7-alpine
    container_name: hosteliq-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  ai-service:
    build: ./ai-service
    container_name: hosteliq-ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: hosteliq-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/hosteliq
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
      - ai-service

volumes:
  postgres-data:
  redis-data:
